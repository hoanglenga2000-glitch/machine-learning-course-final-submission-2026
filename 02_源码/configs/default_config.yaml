# Default pipeline configuration
# Locked hyperparameters for reproducibility

data:
  stage1_panel: data/processed/eurostat_ai_panel.csv
  stage2_panel: data/processed/stage2_industry_panel.csv
  stage1_rows: 544
  stage2_rows: 5814
  geo_groups: 36
  year_range: "2021-2025"

models:
  stage1:
    algorithm: ridge
    cv: group_kfold
    group_column: geo
  stage2:
    algorithm: extra_trees
    n_estimators: 500
    n_seeds: 3
    cv: group_kfold
    group_column: geo

validation:
  strict_exclude:
    - target_workflow_automation
    - E_AI_TPA
    - E_AI_TANY
    - E_AI_EC
    - ai_industry__E_AI_TPA

results:
  stage1_strict_r2: 0.8302
  stage1_strict_mae: 1.9769
  stage2_longrun_r2: 0.7245
  stage2_longrun_mae: 1.9646
